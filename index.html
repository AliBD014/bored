<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Autistic Translator</title>
    <style>
      :root {
        --bg-color: #f0f2f5;
        --card-bg: #ffffff;
        --text-color: #333333;
        --primary-color: #4a90e2;
        --primary-hover: #357abd;
        --border-color: #cccccc;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .container {
        background-color: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
      }

      h1 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 24px;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        box-sizing: border-box;
        resize: vertical;
        font-size: 16px;
      }

      .button-group {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }

      button {
        flex: 1;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .btn-encrypt {
        background-color: var(--primary-color);
        color: white;
      }

      .btn-encrypt:hover {
        background-color: var(--primary-hover);
      }

      .btn-decrypt {
        background-color: #28a745;
        color: white;
      }

      .btn-decrypt:hover {
        background-color: #218838;
      }

      /* Style for the new copy button */
      .btn-copy {
        background-color: #df0c0c;
        color: white;
        width: 100%;
        margin-top: 8px;
      }

      .btn-copy:hover {
        background-color: #df0c0c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>The Autistic Translator</h1>

      <div class="form-group">
        <label for="inputText">Input Text:</label>
        <textarea id="inputText" placeholder="Type your message here..."></textarea>
      </div>

      <div class="button-group">
        <button class="btn-encrypt" onclick="processText(true)">Encrypt</button>
        <button class="btn-decrypt" onclick="processText(false)">Decrypt</button>
      </div>

      <div class="form-group">
        <label for="outputText">Output Text:</label>
        <textarea id="outputText" readonly placeholder="Result will appear here..."></textarea>
        <!-- Added Copy Button Below Output Box -->
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
      </div>
    </div>

    <script>
      // MANUALLY EDIT YOUR LETTER PAIRS HERE
      // Format: 'ORIGINAL_LETTER': 'ENCRYPTED_LETTER'
      // Keep keys lowercase. The script handles uppercase automatically.
      const cipherMap = {
        a: "ش",
        b: "و",
        c: "ى",
        d: "ي",
        e: "ث",
        f: "ب",
        g: "ا",
        h: "ت",
        i: "ه",
        j: "ن",
        k: "ك",
        l: "ط",
        m: "ظ",
        n: "ز",
        o: "ح",
        p: "ج",
        q: "ض",
        r: "ق",
        s: "س",
        t: "ف",
        u: "ع",
        v: "ة",
        w: "ص",
        x: "ر",
        y: "غ",
        z: "ء",
        "1": "١";
        "2": "٢";
        "3": "٣";
        "4": "٤";
        "5": "٥";
        "6": "٦";
        "7": "٧";
        "8": "٨";
        "9": "٩";
        "0": "٠";
        
      };

      // Automatically generates the reverse map for decryption
      const decipherMap = {};
      for (const [key, value] of Object.entries(cipherMap)) {
        decipherMap[value] = key;
      }

      function processText(isEncryption) {
        const input = document.getElementById("inputText").value;
        const map = isEncryption ? cipherMap : decipherMap;
        let output = "";

        for (let i = 0; i < input.length; i++) {
          const char = input[i];
          const lowerChar = char.toLowerCase();

          if (map[lowerChar]) {
            // Check if original character was uppercase
            if (char === char.toUpperCase()) {
              output += map[lowerChar].toUpperCase();
            } else {
              output += map[lowerChar];
            }
          } else {
            // Leave punctuation, numbers, and spaces unchanged
            output += char;
          }
        }

        document.getElementById("outputText").value = output;

        // Reset copy button text when new text is generated
        document.getElementById("copyBtn").innerText = "Copy to Clipboard";
      }

      // New function to handle clipboard copying
      function copyToClipboard() {
        const outputText = document.getElementById("outputText");

        if (!outputText.value) return; // Do nothing if empty

        navigator.clipboard
          .writeText(outputText.value)
          .then(() => {
            const copyBtn = document.getElementById("copyBtn");
            copyBtn.innerText = "Copied!"; // Visual confirmation

            // Revert button text back after 2 seconds
            setTimeout(() => {
              copyBtn.innerText = "Copy to Clipboard";
            }, 2000);
          })
          .catch((err) => {
            console.error("Failed to copy text: ", err);
          });
      }
    </script>
  </body>
</html>
